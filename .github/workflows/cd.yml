name: CD

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:

    strategy:
      fail-fast: false
      matrix:
        runs-on: 
          - self-hosted
        r-version:
          - '4.2.2'

    runs-on: ${{ matrix.runs-on }}

    env:
      LIB_Q: /opt/R/packages/4.2/qualified
      REPO_UNQ: https://rpkgs.pmx.one/r4.2-unqualified/latest
      REPO_Q: https://rpkgs.pmx.one/r4.2-qualified/latest

    outputs:
      build-artifact: ${{ steps.upload-artifact.outputs.artifact-id }}

    steps:
      - name: Add path for R
        if: ${{ matrix.runs-on == 'self-hosted' }}
        run: |
          echo "/opt/R/4.2.2/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"

      - name: Check out repositories
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract package name and version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          PKG_NAME=$(Rscript -e 'cat(read.dcf("DESCRIPTION")[1,"Package"])')
          PKG_VER=$(Rscript -e 'cat(read.dcf("DESCRIPTION")[1,"Version"])')

          echo "PKG_NAME=$PKG_NAME" >> "$GITHUB_ENV"
          echo "PKG_VER=$PKG_VER" >> "$GITHUB_ENV"

      - name: Create ephemeral library
        if: ${{ matrix.runs-on == 'self-hosted' }}
        shell: bash
        run: |
          TEMP_LIB="$RUNNER_TEMP/Rlib-${GITHUB_RUN_ID}"
          mkdir -p "$TEMP_LIB"
          echo "R_LIBS_USER=$TEMP_LIB" >> $GITHUB_ENV

      - name: Install dependencies
        shell: Rscript --no-environ {0}
        run: |
          options(repos = c(
            unqualified = Sys.getenv("REPO_UNQ"),
            qualified   = Sys.getenv("REPO_Q")
          ))
          lib <- Sys.getenv("R_LIBS_USER")
          .libPaths(unique(c(lib, Sys.getenv("LIB_Q"), .libPaths())))
          if (!requireNamespace("remotes", quietly = TRUE)) {
            install.packages("remotes", lib = lib)
          }
          remotes::install_deps(
            dependencies = TRUE,
            lib = lib,
            upgrade = "never"
          )

      - name: Build source package
        shell: bash
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          export R_LIBS="${R_LIBS_USER}:${LIB_Q}:/opt/R/4.2.2/lib/R/library"
          R CMD build .
          echo "PKG=$(ls -t *.tar.gz | head -n1)" >> "$GITHUB_ENV"

      - name: Generate checksums & session info
        run: |
          sha256sum "$PKG" | tee SHA256SUMS
          Rscript -e 'writeLines(capture.output(sessionInfo()), "sessionInfo.txt")'

      - name: Upload build artifacts
        id: upload-artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.PKG_NAME }}-${{ env.PKG_VER }}-${{ github.sha }}
          path: |
            ${{ env.PKG }}
            SHA256SUMS
            sessionInfo.txt
          retention-days: 60

  publish:
    runs-on: self-hosted
    needs:
      - build

    permissions:
      contents: write
      actions: read

    environment: "development"

    env:
      TARGET_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Add path for R and rspm
        run: |
          echo "/opt/R/4.2.2/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"

      - name: Checkout repositories
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          git fetch origin "$TARGET_BRANCH" --prune
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/$TARGET_BRANCH"; then
            echo "❌ Tag commit is not reachable from origin/$TARGET_BRANCH"
            exit 1
          fi
          echo "✅ Tag commit is on $TARGET_BRANCH"

      - name: Extract version from tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          if [[ ! "$TAG" =~ ^v([0-9]+([.][0-9]+)*)$ ]]; then
            echo "❌ Unsupported tag format: $TAG"
            exit 1
          fi

          VER="${BASH_REMATCH[1]}"
          PKG_NAME=$(Rscript -e 'cat(read.dcf("DESCRIPTION")[1,"Package"])')
          echo "PKG_NAME=$PKG_NAME" >> "$GITHUB_ENV"
          echo "PKG_VER=$VER" >> "$GITHUB_ENV"
          echo "ENV=development" >> "$GITHUB_ENV"
          echo "✅ Parsed version: $VER"

      - name: Compare version from tag and DESCRIPTION
        id: ver
        shell: bash
        run: |
          TAG_VER="$PKG_VER"
          DESC_VER=$(Rscript -e 'cat(read.dcf("DESCRIPTION")[1,"Version"])')

          if [ "$TAG_VER" != "$DESC_VER" ]; then
            echo "❌ Version mismatch: tag=$TAG_VER vs DESCRIPTION=$DESC_VER"
            exit 1
          fi
          echo "✅ Version match: $TAG_VER"

      - name: Download build artifact for this commit
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        id: download-artifact
        with:
          artifact-ids: ${{ needs.build.outputs.build-artifact }}
          path: dist

      - name: Verify checksum & locate tarball
        shell: bash
        env:
          DOWNLOAD_PATH: ${{ steps.download-artifact.outputs.download-path }}
        run: |
          cd "$DOWNLOAD_PATH"
          if ! sha256sum -c SHA256SUMS; then
            echo "❌ Checksum verification failed"
            exit 1
          fi
          PKG=$(ls -t *.tar.gz | head -n1)
          echo "PKG=$PKG" >> "$GITHUB_ENV"
          echo "✅ Using tarball: $PKG"

      - name: Publish to PPM development repo
        shell: bash
        env:
          PACKAGEMANAGER_ADDRESS: ${{ secrets.RSPM_ADDRESS }}
          PACKAGEMANAGER_TOKEN: ${{ secrets.RSPM_TOKEN }}
          DOWNLOAD_PATH: ${{ steps.download-artifact.outputs.download-path }}
        run: |
          cd "$DOWNLOAD_PATH"
          echo "🚚 Publishing $PKG . . ."
          rspm add --source=github-sysdev --path="$PKG"
          echo "✅ Published $PKG"

      - name: Create GitHub Release
        if: ${{ success() }}
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          make_latest: true
          body: |
            Published to PPM: ${{ env.ENV }} repo
            Commit: ${{ github.sha }}
            Version: ${{ env.PKG_VER }}
            Checksums in SHA256SUMS.
          files: |
            dist/${{ env.PKG }}
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
