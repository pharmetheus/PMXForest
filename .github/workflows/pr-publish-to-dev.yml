name: PR Dev Publish

on:
  pull_request:
    types:
      - labeled
    branches:
      - main

concurrency:
  group: pr-dev-publish-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PR_LABEL: 'publish-to-dev'
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:

  build:
    if: ${{ contains(github.event.pull_request.labels.*.name, 'publish-to-dev') }}

    strategy:
      fail-fast: false
      matrix:
        runs-on: 
          - self-hosted
        r-version:
          - '4.2.2'

    runs-on: ${{ matrix.runs-on }}

    env:
      LIB_Q: /opt/R/packages/4.2/qualified
      REPO_UNQ: https://rpkgs.pmx.one/r4.2-unqualified/latest
      REPO_Q: https://rpkgs.pmx.one/r4.2-qualified/latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      build-artifact: ${{ steps.upload-artifact.outputs.artifact-id }}
      artifact-url: ${{ steps.upload-artifact.outputs.artifact-url }}

    steps:
      - name: Add path for R
        if: ${{ matrix.runs-on == 'self-hosted' }}
        run: |
          echo "/opt/R/4.2.2/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"

      - name: Check out repositories
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get package name and version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          PKG_NAME=$(Rscript -e 'cat(read.dcf("DESCRIPTION")[1,"Package"])')
          VERSION=$(Rscript -e 'cat(read.dcf("DESCRIPTION")[1,"Version"])')

          echo "PKG_NAME=$PKG_NAME" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create ephemeral library
        if: ${{ matrix.runs-on == 'self-hosted' }}
        shell: bash
        run: |
          TEMP_LIB="$RUNNER_TEMP/Rlib-${GITHUB_RUN_ID}"
          mkdir -p "$TEMP_LIB"
          echo "R_LIBS_USER=$TEMP_LIB" >> $GITHUB_ENV

      - name: Install dependencies
        shell: Rscript --no-environ {0}
        run: |
          options(repos = c(
            unqualified = Sys.getenv("REPO_UNQ"),
            qualified   = Sys.getenv("REPO_Q")
          ))
          lib <- Sys.getenv("R_LIBS_USER")
          .libPaths(unique(c(lib, Sys.getenv("LIB_Q"), .libPaths())))
          if (!requireNamespace("remotes", quietly = TRUE)) {
            install.packages("remotes", lib = lib)
          }
          remotes::install_deps(
            dependencies = TRUE,
            lib = lib,
            upgrade = "never"
          )

      - name: Build source package
        shell: bash
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          export R_LIBS="${R_LIBS_USER}:${LIB_Q}:/opt/R/4.2.2/lib/R/library"
          R CMD build .
          echo "PKG=$(ls -t *.tar.gz | head -n1)" >> "$GITHUB_ENV"

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        id: upload-artifact
        with:
          name: ${{ env.PKG_NAME }}-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: |
            ${{ env.PKG }}

  publish:
    if: ${{ contains(github.event.pull_request.labels.*.name, 'publish-to-dev') }}
    environment: development

    needs:
      - build

    runs-on: self-hosted

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Add path for rspm
        run: |
          echo "/usr/local/bin" >> "$GITHUB_PATH"

      - name: Check out repositories
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        id: download-artifact
        with:
          artifact-ids: ${{ needs.build.outputs.build-artifact }}
          path: dist

      - name: Locate tarball
        shell: bash
        env:
          DOWNLOAD_PATH: ${{ steps.download-artifact.outputs.download-path }}
        run: |
          cd "$DOWNLOAD_PATH"
          PKG=$(ls -t *.tar.gz | head -n1)
          echo "PKG=$PKG" >> "$GITHUB_ENV"
          echo "✅ Using tarball: $PKG"

      - name: Publish to PPM development repo
        shell: bash
        env:
          PACKAGEMANAGER_ADDRESS: ${{ secrets.RSPM_ADDRESS }}
          PACKAGEMANAGER_TOKEN: ${{ secrets.RSPM_TOKEN }}
          DOWNLOAD_PATH: ${{ steps.download-artifact.outputs.download-path }}
        run: |
          cd "$DOWNLOAD_PATH"
          echo "🚚 Uploading $PKG . . ."
          rspm add --source=github-sysdev --path="$PKG"
          echo "✅ Published $PKG"

      - name: Comment on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          VERSION: ${{ needs.build.outputs.version }}
          COMMIT: ${{ github.event.pull_request.head.sha }}
          URL: ${{ needs.build.outputs.artifact-url }}
        with:
          script: |
            const body = [
              `:white_check_mark: Published version **${process.env.VERSION}** to PPM (development)`,
              `- Commit: ${process.env.COMMIT}`,
              `- Artifact: [${process.env.PKG}](${process.env.URL})`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  remove-label:
    if: ${{ always() && contains(github.event.pull_request.labels.*.name, 'publish-to-dev') }}
    needs:
      - build
      - publish
    runs-on: ubuntu-slim

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repositories
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Remove ${{ env.PR_LABEL }} label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "$PR_NUMBER" --remove-label "$PR_LABEL"
